name: Pipeline CI/CD - Proyecto DevOps

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:

  # =========================
  # ETAPA 1: BUILD
  # =========================
  build:
    name: Build - Preparar proyecto
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Crear carpeta de distribución
        run: mkdir dist

      - name: Copiar archivos del proyecto
        run: |
          cp index.html dist/
          cp estilos.css dist/
          cp script.js dist/

      - name: Verificar resultado del build
        run: |
          echo "Archivos preparados para publicación:"
          ls -la dist

      - name: Guardar resultado del build
        uses: actions/upload-artifact@v4
        with:
          name: proyecto-compilado
          path: dist
          retention-days: 1

  # =========================
  # ETAPA 2: TEST
  # =========================
  test:
    name: Test - Validar proyecto
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Descargar resultado del build
        uses: actions/download-artifact@v4
        with:
          name: proyecto-compilado
          path: dist

      - name: Verificar archivo index.html
        run: |
          test -f dist/index.html
          echo "Prueba superada: index.html existe."

      - name: Verificar archivo estilos.css
        run: |
          test -f dist/estilos.css
          echo "Prueba superada: estilos.css existe."

      - name: Verificar archivo script.js
        run: |
          test -f dist/script.js
          echo "Prueba superada: script.js existe."

      - name: Verificar estructura HTML básica
        run: |
          grep -qi "<html" dist/index.html
          grep -qi "<head" dist/index.html
          grep -qi "<body" dist/index.html
          grep -qi "</html>" dist/index.html
          echo "Prueba superada: estructura HTML válida."

      - name: Verificar conexión con CSS
        run: |
          grep -q 'href="estilos.css"' dist/index.html
          echo "Prueba superada: index.html carga estilos.css."

      - name: Verificar conexión con JavaScript
        run: |
          grep -q 'src="script.js"' dist/index.html
          echo "Prueba superada: index.html carga script.js."

  # =========================
  # ETAPA 3: DEPLOY
  # =========================
  deploy:
    name: Deploy - Publicar en GitHub Pages
    runs-on: ubuntu-latest
    needs:
      - build
      - test

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Descargar resultado aprobado
        uses: actions/download-artifact@v4
        with:
          name: proyecto-compilado
          path: dist

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar artefacto de GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Publicar página
        id: deployment
        uses: actions/deploy-pages@v4